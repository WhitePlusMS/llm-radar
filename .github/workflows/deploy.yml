name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: GITHUB_PAGES=true npm run build

      - name: Deploy to master branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/deploy
          cp -r dist/. /tmp/deploy/
          cp README.md /tmp/deploy/
          mkdir -p /tmp/deploy/.github/workflows
          cp .github/workflows/deploy.yml /tmp/deploy/.github/workflows/
          git checkout --orphan __deploy
          git rm -rf .
          cp -r /tmp/deploy/. .
          git add .
          git commit -m "deploy: update GitHub Pages from master"
          git push -f origin __deploy:master
