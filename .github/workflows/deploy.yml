name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: GITHUB_PAGES=true npm run build

      - name: Deploy to master branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/deploy-master
          cp -r dist/. /tmp/deploy-master/
          cp README.md /tmp/deploy-master/
          mkdir -p /tmp/deploy-master/.github/workflows
          cp .github/workflows/deploy.yml /tmp/deploy-master/.github/workflows/
          cd /tmp/deploy-master
          git init
          git add .
          git commit -m "deploy: update GitHub Pages from master"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin master

      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/deploy-gh-pages
          cp -r dist/. /tmp/deploy-gh-pages/
          cd /tmp/deploy-gh-pages
          git init
          git add .
          git commit -m "deploy: update GitHub Pages from master"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin gh-pages
