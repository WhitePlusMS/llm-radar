  mmlu:
    value: 85.7
    source: gpt-4.1-announcement
  mmlu-pro:
    value: 72.6
    source: mmlu-pro-paper
  gpqa:
    value: 46.0
    source: gpt-4.1-announcement
  humaneval:
    value: 90.2
    source: mmlu-pro-paper
  swe-bench:
    value: 33.2
    source: gpt-4.1-announcement
  ifeval:
    value: 81.0
    source: gpt-4.1-announcement
  # 原始来源未报告：math-level-5, gsm8k, arena-elo, bbh, drop, hellaswag, arc-c, winogrande
